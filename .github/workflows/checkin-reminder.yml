name: Check In Reminder

on:
  schedule:
    # 每7天提醒一次：每周一北京时间 10:00（UTC 2:00）
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Send Feishu reminder
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then
            echo "FEISHU_WEBHOOK_URL not set, skipping"
            exit 0
          fi

          curl -s -X POST "$FEISHU_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "interactive",
              "card": {
                "header": {
                  "title": {
                    "tag": "plain_text",
                    "content": "⏰ TrendRadar 签到提醒"
                  },
                  "template": "blue"
                },
                "elements": [
                  {
                    "tag": "div",
                    "text": {
                      "tag": "lark_md",
                      "content": "你的 TrendRadar 热点监控已经运行了 **7 天**，即将到期！\n\n请在 GitHub Actions 中运行 **Check In** 签到续期，否则热点推送将自动停止。\n\n👉 [点击前往签到](https://github.com/zgshe/TrendRadar/actions/workflows/clean-crawler.yml)"
                    }
                  },
                  {
                    "tag": "action",
                    "actions": [
                      {
                        "tag": "button",
                        "text": {
                          "tag": "plain_text",
                          "content": "前往签到"
                        },
                        "type": "primary",
                        "url": "https://github.com/zgshe/TrendRadar/actions/workflows/clean-crawler.yml"
                      }
                    ]
                  }
                ]
              }
            }'